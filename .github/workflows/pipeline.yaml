name: CI/CD
on:
  pull_request:
    branches: [ "release", "master" ]
  push:
    branches: [ "release", "master" ]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test:unit

  deploy-staging:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Deploy backend to EC2 (staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.STAGING_EC2_USER }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            cd ~/app/backend
            git fetch origin
            git checkout release
            git pull origin release
            npm ci --production
            npm run build
            pm2 restart backend --update-env
      # - name: Deploy frontend to EC2 (staging)
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.STAGING_EC2_HOST }}
      #     username: ${{ secrets.STAGING_EC2_USER }}
      #     key: ${{ secrets.STAGING_EC2_SSH_KEY }}
      #     script: |
      #       cd ~/app/frontend
      #       git fetch origin
      #       git checkout release
      #       git pull origin release
      #       npm ci --production
      #       npm run build
      #       pm2 restart frontend --update-env

  deploy-production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Deploy backend to EC2 (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            cd ~/app/backend
            git fetch origin
            git checkout master
            git pull origin master
            npm ci --production
            npm run build
            pm2 restart backend --update-env
      - name: Deploy frontend to EC2 (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            cd ~/app/frontend
            git fetch origin
            git checkout master
            git pull origin master
            npm ci --production
            npm run build
            pm2 restart frontend --update-env