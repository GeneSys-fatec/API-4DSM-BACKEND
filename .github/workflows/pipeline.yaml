name: CI/CD
on:
  pull_request:
    branches: [ "develop", "release", "master" ]
  push:
    branches: [ "develop", "release", "master" ]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test:unit

  deploy-sandbox:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: sandbox
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Deploy backend to EC2 (sandbox)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          key: ${{ secrets.SANDBOX_EC2_SSH_KEY }}
          script: |
            cd ~/app/backend
            git fetch origin
            git checkout develop
            git pull origin develop
            npm ci
            pm2 describe backend > /dev/null 2>&1 \
              && pm2 restart backend --update-env \
              || pm2 start npm --name "backend" -- start

  deploy-release:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Deploy backend to EC2 (release)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RELEASE_EC2_HOST }}
          username: ${{ secrets.RELEASE_EC2_USER }}
          key: ${{ secrets.RELEASE_EC2_SSH_KEY }}
          script: |
            cd ~/app/backend
            git fetch origin
            git checkout release
            git pull origin release
            npm ci
            pm2 describe backend > /dev/null 2>&1 \
              && pm2 restart backend --update-env \
              || pm2 start npm --name "backend" -- start

  deploy-production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Deploy backend to EC2 (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            cd ~/app/backend
            git fetch origin
            git checkout master
            git pull origin master
            npm ci
            pm2 describe backend > /dev/null 2>&1 \
              && pm2 restart backend --update-env \
              || pm2 start npm --name "backend" -- start